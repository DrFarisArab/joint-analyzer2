plugins {
    id 'com.android.application'
}

android {
    namespace 'com.jointanalyzer.app'
    compileSdk 34

    defaultConfig {
        applicationId 'com.jointanalyzer.app'
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug   // use debug key for release too
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // No extra dependencies — plain WebView is built into Android
}
